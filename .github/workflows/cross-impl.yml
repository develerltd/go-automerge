name: Cross-Implementation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read

env:
  UPSTREAM_REPO: https://github.com/automerge/automerge.git
  UPSTREAM_COMMIT: 8246d0f8218cd49dc1af56ba6eefd88ed215665c

jobs:
  cross-impl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            upstream-automerge/rust/target
          key: rust-cross-impl-${{ env.UPSTREAM_COMMIT }}

      - name: Clone upstream automerge
        run: |
          rm -rf upstream-automerge
          git clone --no-checkout "$UPSTREAM_REPO" upstream-automerge
          cd upstream-automerge
          git checkout "$UPSTREAM_COMMIT"

      - name: Install fixture-gen into upstream tree
        run: |
          cp -r testutil/fixture-gen upstream-automerge/rust/fixture-gen
          sed -i 's|path = "../../rust/automerge"|path = "../automerge"|' upstream-automerge/rust/fixture-gen/Cargo.toml
          sed -i 's/^members = \[/members = [\n    "fixture-gen",/' upstream-automerge/rust/Cargo.toml

      - name: Build fixture-gen
        run: |
          cd upstream-automerge/rust
          cargo build --release -p fixture-gen

      - name: Build automerge CLI
        run: |
          cd upstream-automerge/rust
          cargo build --release -p automerge-cli

      - name: Generate fresh fixtures
        run: |
          upstream-automerge/rust/target/release/fixture-gen automerge/testdata/

      - name: Run cross-implementation tests
        run: go test -v -count=1 ./automerge/ -run TestCrossImpl

      - name: Verify with Rust CLI
        env:
          AUTOMERGE_CLI: ${{ github.workspace }}/upstream-automerge/rust/target/release/automerge
        run: go test -v -count=1 ./automerge/ -run TestCrossImplRustCLI
